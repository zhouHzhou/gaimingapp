name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        working-directory: Windows
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "批量重命名" batch_renamer.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BatchRenamer-Windows
          path: Windows/dist/批量重命名.exe
